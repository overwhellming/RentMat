services:
  rentmat-api:
    image: rentmat.api
    container_name: rentmat-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    build:
      context: .
      dockerfile: RentMat.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=rentmat-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - Seq__DefaultConnection=http://rentmat-seq:80
    depends_on:
      rentmat-db:
        condition: service_healthy
      rentmat-seq:
        condition: service_started

  rentmat-db:
    image: postgres:18-alpine
    container_name: rentmat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
  
  rentmat-seq:
    image: datalust/seq:latest
    container_name: rentmat_seq
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_PASSWORD=${SEQ_PASSWORD}
    ports:
      - "5341:80"